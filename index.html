                                        <img src={m.img} className="w-full h-full object-cover" alt={currentData(m).name} />
                                    </div>
                                    <h4 className="text-2xl font-black mb-2 text-center text-stone-900">{currentData(m).name}</h4>
                                    <p className="text-orange-600 text-xs font-black tracking-widest mb-6 uppercase h-10 flex items-center justify-center text-center px-4 leading-tight text-center">{currentData(m).title}</p>
                                    <div className="mt-auto flex items-center justify-center gap-1.5 text-xs font-black text-stone-400 group-hover:text-orange-500 transition-colors text-center text-center"><Icon name="info" size={14} /> {t.mentors.info}</div>
                                </div>
                            ))}
                        </div>
                    </div>
                    {selected && (
                        <div className="fixed inset-0 z-[110] flex items-center justify-center p-4 bg-stone-900/80 backdrop-blur-md" onClick={() => setSelected(null)}>
                            <div className="relative w-full max-w-2xl bg-white rounded-[3rem] p-10 md:p-16 shadow-2xl text-left text-stone-900 text-left text-stone-900 text-left" onClick={e => e.stopPropagation()}>
                                <button className="absolute top-8 right-8 w-12 h-12 bg-stone-100 rounded-full flex items-center justify-center transition-colors text-stone-800" onClick={() => setSelected(null)}><Icon name="x" /></button>
                                <div className="flex flex-col md:flex-row items-center gap-10 mb-12 text-left">
                                    <div className="w-40 h-40 rounded-full overflow-hidden shadow-xl ring-4 ring-stone-50"><img src={selected.img} className="w-full h-full object-cover" alt={currentData(selected).name}/></div>
                                    <div className="text-stone-900 text-left">
                                        <h3 className="text-4xl font-black mb-2 text-left">{currentData(selected).name}</h3>
                                        <p className="text-stone-500 font-bold text-left">{currentData(selected).title}</p>
                                    </div>
                                </div>
                                <p className="text-stone-800 font-black text-xl italic border-l-8 border-orange-500 pl-8 mb-10 text-stone-900 text-left">{currentData(selected).quote}</p>
                                <p className="text-stone-600 leading-relaxed font-medium text-lg text-stone-600 text-left">{currentData(selected).bio}</p>
                                <button onClick={() => setSelected(null)} className="text-stone-400 hover:text-stone-600 font-black transition-all text-sm underline underline-offset-8 uppercase tracking-widest text-center mt-12 block w-full text-center">{t.mentors.back}</button>
                            </div>
                        </div>
                    )}
                </section>
            );
        };

        const Journey = () => {
            const { t } = useContext(LangContext);
            return (
                <section id="五日行程" className="py-32 bg-white relative text-center">
                    <div className="max-w-7xl mx-auto px-6 text-center md:text-left text-stone-900 text-center text-center">
                        <div className="bg-emerald-50 p-10 rounded-[3rem] mb-20 border border-emerald-100 text-stone-900 text-left text-stone-900 text-left">
                             <h3 className="text-2xl font-black text-emerald-900 mb-6 flex items-center gap-4 text-center md:text-left text-emerald-900 text-left text-left text-left"><Icon name="info" size={28} className="text-emerald-500" /> {t.journey.logisticsTitle}</h3>
                             <p className="text-emerald-800/80 leading-relaxed font-medium text-left">{t.journey.logisticsDesc}</p>
                        </div>
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-20 text-center">
                            <div className="text-stone-900 text-center md:text-left text-stone-900 text-center text-center">
                                <h2 className="text-4xl md:text-6xl font-black mb-8 text-stone-800 text-center md:text-left text-stone-800 text-center">{t.journey.title}</h2>
                                <div className="inline-flex items-center gap-2 bg-stone-100 px-6 py-3 rounded-2xl text-stone-700 font-black mb-8 border border-stone-200 shadow-sm text-center text-center"><Icon name="calendar" className="text-orange-500" /> 06/28 - 07/02</div>
                            </div>
                            <div className="lg:col-span-2 border-l-4 border-stone-50 pl-10 text-left text-stone-900 text-left">
                                {t.journey.days.map((d, i) => (
                                    <div key={i} className="mb-16 relative text-left">
                                        <div className="absolute -left-[54px] top-0 w-6 h-6 rounded-full bg-orange-500 border-4 border-white text-left text-left" />
                                        <h3 className="text-2xl font-black text-stone-900 mb-4 text-left text-left">{d.day} {d.title}</h3>
                                        <div className="bg-stone-50 p-8 rounded-3xl text-left text-left text-left text-left"><p className="mb-4 font-medium text-stone-700 leading-relaxed text-left text-left text-left">{d.desc}</p><div className="flex items-center text-stone-400 text-xs font-bold uppercase text-left text-left text-left"><Icon name="map-pin" size={14} className="mr-2 text-orange-500" />{d.location}</div></div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        const Footer = () => {
            const { t } = useContext(LangContext);
            return (
                <footer className="py-24 bg-stone-900 text-stone-400 px-6 border-t border-stone-800 text-left text-left text-left text-left text-left">
                    <div className="max-w-7xl mx-auto text-left text-stone-300 text-stone-300 text-left text-left">
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-16 mb-16 text-stone-300 text-left text-left text-left">
                            <div className="col-span-1 md:col-span-2 text-left text-left text-left">
                                <div className="flex items-center gap-3 mb-6 text-left text-left">
                                     <img src="https://i.ibb.co/ZzxC3BVn/icon.png" alt="TERRA Icon" className="h-10 w-auto" />
                                     <p className="text-base font-medium text-white leading-relaxed uppercase tracking-widest text-white text-left text-left">TERRA SCHOOL 2026</p>
                                </div>
                                <p className="text-sm font-medium text-stone-500 mb-10 text-left leading-relaxed text-left text-left">{t.footer.desc}</p>
                                <div className="flex gap-4 text-white text-left text-left">
                                    <a href={FB_TERRA_LINK} target="_blank" className="bg-orange-500 text-white px-8 py-4 rounded-2xl font-black text-sm uppercase tracking-widest flex items-center gap-2 hover:bg-orange-600 transition-all shadow-lg text-white text-left text-left text-left"><Icon name="message-circle" size={18} /> {t.footer.consult}</a>
                                </div>
                            </div>
                            <div className="text-left text-left text-left text-left">
                                <h5 className="text-white font-black mb-8 uppercase text-xs tracking-widest text-stone-300 text-left text-left text-left">{t.footer.organizer}</h5>
                                <a href="https://www.facebook.com/1221feda" target="_blank" className="text-sm font-bold hover:text-orange-400 text-stone-300 text-left text-left">1221未來教育發展協會</a>
                            </div>
                            <div className="text-left text-stone-300 text-left text-left text-left">
                                <h5 className="text-white font-black mb-8 uppercase text-xs tracking-widest text-white text-stone-300 text-stone-300 text-left text-left text-left">協辦單位</h5>
                                <ul className="text-sm space-y-4 font-bold text-stone-500 text-stone-500 text-left text-left text-left">
                                    {t.footer.coorgList.map((item, idx) => (
                                        <li key={idx} className="text-left text-left text-left">{item}</li>
                                    ))}
                                </ul>
                            </div>
                        </div>
                        <div className="pt-10 border-t border-stone-800/50 flex flex-col md:flex-row justify-between items-center text-[10px] font-black uppercase tracking-[0.3em] text-center text-stone-700 text-center text-center">
                            <div className="mb-4 md:mb-0 text-center text-stone-700 text-center text-center">© 2026. TERRA SCHOOL. 06/28 - 07/02</div>
                            <div className="flex gap-8 text-center text-stone-600 text-center text-center text-center text-center text-center text-center"><a href="#" className="hover:text-orange-500 text-center text-stone-600 text-center text-center text-center text-center text-center">FAQ</a><a href={FB_TERRA_LINK} target="_blank" className="hover:text-orange-500 text-center text-stone-600 text-center text-center text-center text-center text-center">Contact</a></div>
                        </div>
                    </div>
                </footer>
            );
        };

        const App = () => {
            const [lang, setLang] = useState('zh');
            const t = translations[lang];

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [lang]);

            return (
                <LangContext.Provider value={{ lang, setLang, t }}>
                    <div className="min-h-screen selection:bg-orange-200 selection:text-orange-900 bg-stone-50 text-stone-900 antialiased text-center md:text-left">
                        <Navbar />
                        <main>
                            <Hero />
                            <WhyTerra />
                            <IntegratedSection />
                            <Mentors />
                            <Journey />
                        </main>
                        <Footer />
                    </div>
                </LangContext.Provider>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
